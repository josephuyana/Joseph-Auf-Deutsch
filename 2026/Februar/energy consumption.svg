<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            /* Tipografía y Estilos Globales */
            text {
                font-family: 'Futura', 'Helvetica Neue', 'Segoe UI', sans-serif;
                fill: #616161;
            }
            .bg { fill: #f8f9fa; }
            .outline { stroke: #9e9e9e; stroke-width: 8; fill: #ffffff; }
            .fill-batt { fill: #81c784; }
            .fill-grey { fill: #e0e0e0; }
            .fill-dark { fill: #424242; }
            
            /* DURACIÓN TOTAL DEL CICLO: 24 Segundos */

            /* Animaciones de Visibilidad de Escenas (Transiciones suaves) */
            @keyframes s1_visibility {
                0%, 28% { opacity: 1; visibility: visible; }
                33%, 100% { opacity: 0; visibility: hidden; }
            }
            @keyframes s2_visibility {
                0%, 28% { opacity: 0; visibility: hidden; }
                33%, 61% { opacity: 1; visibility: visible; }
                66%, 100% { opacity: 0; visibility: hidden; }
            }
            @keyframes s3_visibility {
                0%, 61% { opacity: 0; visibility: hidden; }
                66%, 95% { opacity: 1; visibility: visible; }
                100% { opacity: 0; visibility: hidden; }
            }

            .scene1 { animation: s1_visibility 24s infinite; }
            .scene2 { animation: s2_visibility 24s infinite; }
            .scene3 { animation: s3_visibility 24s infinite; }

            /* --- ESCENA 1: Animaciones --- */
            @keyframes typing_effect {
                0%, 5% { width: 0; }
                20%, 100% { width: 480px; } /* Ajustado para el texto en inglés */
            }
            .typing-box { animation: typing_effect 24s infinite ease-in-out; }

            @keyframes spinner_rotate {
                0%, 20% { opacity: 0; }
                25% { opacity: 1; transform: rotate(0deg); }
                33% { opacity: 0; transform: rotate(360deg); }
                100% { opacity: 0; }
            }
            .spinner { transform-origin: 640px 380px; animation: spinner_rotate 24s infinite linear; }

            /* --- ESCENA 2: Animaciones --- */
            /* Drenaje de batería más lento */
            @keyframes battery_drain_s2 {
                0%, 33% { y: 210px; height: 300px; } /* Comienza lleno */
                58%, 100% { y: 510px; height: 0px; }  /* Termina vacío */
            }
            .s2-drain { animation: battery_drain_s2 24s infinite ease-in-out; }

            /* Revelado de imagen sincronizado */
            @keyframes image_reveal {
                0%, 33% { y: 530px; height: 0px; } /* Comienza oculto abajo */
                58%, 100% { y: 190px; height: 340px; } /* Termina visible arriba */
            }
            .banana-reveal-box { animation: image_reveal 24s infinite ease-in-out; }

            /* --- ESCENA 3: Animaciones --- */
            /* Drenaje de batería para S3 */
            @keyframes battery_drain_s3 {
                0%, 66% { y: 210px; height: 300px; }
                90%, 100% { y: 510px; height: 0px; }
            }
            .s3-drain { animation: battery_drain_s3 24s infinite ease-in-out; }

            /* Lógica de Pantalla de Celular: Apagado -> Encendido -> Interfaz */
            @keyframes phone_screen_logic {
                0%, 89% { opacity: 1; visibility: visible; } /* Pantalla Negra visible */
                90%, 100% { opacity: 0; visibility: hidden; } /* Se oculta al finalizar carga */
            }
            .phone-screen-off { animation: phone_screen_logic 24s infinite step-end; }

            @keyframes phone_interface_logic {
                0%, 89.9% { opacity: 0; visibility: hidden; } /* Oculto */
                90% { opacity: 1; visibility: visible; } /* Aparece de golpe al 90% */
                93% { opacity: 1; } 
                100% { opacity: 1; }
            }
            .phone-interface-on { animation: phone_interface_logic 24s infinite step-start; }
            
            /* Animación interna de la interfaz (Fully Charged -> Home) */
            @keyframes interface_switch {
                 0%, 92% { opacity: 1; } /* Muestra "Fully Charged" brevemente */
                 93%, 100% { opacity: 0; } /* Se oculta para mostrar el home */
            }
            .charged-message { animation: interface_switch 24s infinite step-end; }
            
            @keyframes home_switch {
                 0%, 92% { opacity: 0; } /* Oculto */
                 93%, 100% { opacity: 1; } /* Muestra Home Screen */
            }
            .home-screen { animation: home_switch 24s infinite step-start; }

        </style>

        <clipPath id="typing-cp">
            <rect x="400" y="250" height="60" width="0" class="typing-box" />
        </clipPath>
        <clipPath id="reveal-cp">
            <rect x="750" y="530" width="340" height="0" class="banana-reveal-box" />
        </clipPath>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <g class="scene1">
        <rect x="360" y="180" width="560" height="360" rx="15" class="outline" />
        <rect x="610" y="540" width="60" height="80" class="fill-grey" />
        <rect x="540" y="620" width="200" height="15" rx="5" class="fill-grey" />

        <g clip-path="url(#typing-cp)">
            <text x="410" y="290" font-size="28" font-weight="bold">Generate an image of a banana</text>
        </g>

        <circle cx="640" cy="380" r="30" fill="none" stroke="#9e9e9e" stroke-width="6" stroke-dasharray="120 50" stroke-linecap="round" class="spinner" />
    </g>

    <g class="scene2">
        <g transform="translate(280, 200)">
            <rect x="0" y="0" width="160" height="320" rx="15" fill="none" stroke="#9e9e9e" stroke-width="8" />
            <rect x="60" y="-25" width="40" height="25" rx="5" fill="#9e9e9e" />
        </g>
        <rect x="290" y="210" width="140" height="300" rx="5" class="fill-batt s2-drain" />

        <rect x="760" y="200" width="320" height="320" rx="15" class="outline" />
        
        <g clip-path="url(#reveal-cp)">
            <g transform="translate(780, 220)">
                <path d="M 40,200 C 80,260 200,260 260,120 C 200,220 100,220 40,200 Z" fill="#fdd835"/>
                <path d="M 260,120 L 280,90 L 295,100 L 255,135" fill="#8d6e63"/>
                <path d="M 40,200 C 35,198 30,205 32,210 C 38,215 45,205 40,200" fill="#8d6e63"/>
                <circle cx="120" cy="220" r="4" fill="#8d6e63" opacity="0.5"/>
                <circle cx="180" cy="200" r="3" fill="#8d6e63" opacity="0.5"/>
            </g>
        </g>
    </g>

    <g class="scene3">
        <g transform="translate(280, 200)">
            <rect x="0" y="0" width="160" height="320" rx="15" fill="none" stroke="#9e9e9e" stroke-width="8" />
            <rect x="60" y="-25" width="40" height="25" rx="5" fill="#9e9e9e" />
        </g>
        <rect x="290" y="210" width="140" height="300" rx="5" class="fill-batt s3-drain" />

        <rect x="830" y="160" width="180" height="380" rx="25" class="outline" />
        
        <rect x="840" y="170" width="160" height="360" rx="15" class="fill-dark phone-screen-off" />

        <g class="phone-interface-on">
            <rect x="840" y="170" width="160" height="360" rx="15" fill="#ffffff" />
            
            <g class="charged-message">
                <path d="M 895,270 L 910,285 L 945,250" fill="none" stroke="#81c784" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
                <text x="920" y="340" font-size="20" font-weight="bold" text-anchor="middle" fill="#81c784">FULLY</text>
                <text x="920" y="365" font-size="20" font-weight="bold" text-anchor="middle" fill="#81c784">CHARGED</text>
            </g>
            
            <g class="home-screen">
                 <text x="920" y="220" font-size="32" font-weight="bold" text-anchor="middle">10:00</text>
                <rect x="860" y="280" width="30" height="30" rx="5" fill="#e0e0e0" />
                <rect x="900" y="280" width="30" height="30" rx="5" fill="#e0e0e0" />
                <rect x="940" y="280" width="30" height="30" rx="5" fill="#e0e0e0" />
                <rect x="860" y="330" width="30" height="30" rx="5" fill="#e0e0e0" />
                <rect x="900" y="330" width="30" height="30" rx="5" fill="#e0e0e0" />
                <rect x="940" y="330" width="30" height="30" rx="5" fill="#e0e0e0" />
                 <rect x="855" y="480" width="130" height="40" rx="10" fill="#f0f0f0" />
            </g>
        </g>
    </g>
</svg>