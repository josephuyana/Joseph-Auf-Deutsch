<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    
    .axis { 
      stroke: #e5e7eb; 
      stroke-width: 2; 
      stroke-linecap: round; 
    }
    
    .axis-label { 
      fill: #9ca3af; 
      font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
      font-size: 14px; 
      user-select: none; 
    }
    
    .curve-path {
      fill: none;
      stroke: #374151;
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    
    .wall-line { 
      stroke: #111827; 
      stroke-width: 3; 
    }
    
    .wall-text { 
      fill: #111827; 
      font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
      font-size: 26px; 
      font-weight: 700; 
      letter-spacing: 2px; 
    }
    
    /* El rectángulo que sirve de máscara, crece de 0 a 500px de ancho */
    .clip-rect {
      transform-origin: 0 0;
      animation: revealCurve 8s linear infinite;
    }
    
    /* El mundo se mueve en dirección contraria para mantener el final de la curva en el centro */
    .world-group {
      animation: moveCamera 8s linear infinite;
    }
    
    /* El punto fijo en el centro que simula la lente de la cámara dibujando */
    .focus-dot {
      fill: #ffffff;
      stroke: #111827;
      stroke-width: 2.5;
      animation: dotPulse 8s linear infinite;
    }

    /* Animación de la máscara (revela la línea en sincronía con la cámara) */
    @keyframes revealCurve {
      0% { transform: scaleX(0); }
      60%, 90% { transform: scaleX(1); }
      94%, 100% { transform: scaleX(0); }
    }

    /* Animación del movimiento del mundo (ejes, curva, muro) */
    @keyframes moveCamera {
      0%  { transform: translate(400px, 300px); opacity: 1; }
      3%  { transform: translate(375px, 300px); }
      6%  { transform: translate(350px, 300.1px); }
      9%  { transform: translate(325px, 300.5px); }
      12% { transform: translate(300px, 301.6px); }
      15% { transform: translate(275px, 303.9px); }
      18% { transform: translate(250px, 308.1px); }
      21% { transform: translate(225px, 315px); }
      24% { transform: translate(200px, 325.6px); }
      27% { transform: translate(175px, 341px); }
      30% { transform: translate(150px, 362.5px); }
      33% { transform: translate(125px, 391.5px); }
      36% { transform: translate(100px, 429.6px); }
      39% { transform: translate(75px, 478.5px); }
      42% { transform: translate(50px, 540.1px); }
      45% { transform: translate(25px, 616.4px); }
      48% { transform: translate(0px, 709.6px); }
      51% { transform: translate(-25px, 822px); }
      54% { transform: translate(-50px, 956.1px); }
      57% { transform: translate(-75px, 1114.5px); }
      /* Choque con el muro (x=500, y=-1000) */
      60% { transform: translate(-100px, 1300px); opacity: 1; }
      90% { transform: translate(-100px, 1300px); opacity: 1; }
      /* Fade out y reinicio */
      93% { transform: translate(-100px, 1300px); opacity: 0; }
      94% { transform: translate(400px, 300px); opacity: 0; }
      100%{ transform: translate(400px, 300px); opacity: 1; }
    }

    /* Efecto de impacto en el punto central al chocar con el 2026 */
    @keyframes dotPulse {
      0%, 59% { r: 4.5; stroke-width: 2.5; }
      60%, 90% { r: 7; stroke-width: 3.5; }
      94%, 100% { r: 4.5; stroke-width: 2.5; }
    }
  </style>

  <defs>
    <clipPath id="curveClip" clipPathUnits="userSpaceOnUse">
      <rect class="clip-rect" x="0" y="-1500" width="500" height="2000" />
    </clipPath>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <g class="world-group">
    
    <line class="axis" x1="-200" y1="20" x2="800" y2="20" />
    <line class="axis" x1="0" y1="-1200" x2="0" y2="100" />
    
    <text x="780" y="45" class="axis-label">X</text>
    <text x="15" y="-1180" class="axis-label">Y</text>

    <line class="axis" x1="100" y1="15" x2="100" y2="25" />
    <line class="axis" x1="200" y1="15" x2="200" y2="25" />
    <line class="axis" x1="300" y1="15" x2="300" y2="25" />
    <line class="axis" x1="400" y1="15" x2="400" y2="25" />

    <g clip-path="url(#curveClip)">
      <path class="curve-path" d="M 0,0 
               L 25,0 
               L 50,-0.1 
               L 75,-0.5 
               L 100,-1.6 
               L 125,-3.9 
               L 150,-8.1 
               L 175,-15 
               L 200,-25.6 
               L 225,-41 
               L 250,-62.5 
               L 275,-91.5 
               L 300,-129.6 
               L 325,-178.5 
               L 350,-240.1 
               L 375,-316.4 
               L 400,-409.6 
               L 425,-522 
               L 450,-656.1 
               L 475,-814.5 
               L 500,-1000" />
    </g>

    <g class="wall">
      <line class="wall-line" x1="500" y1="-1500" x2="500" y2="50" />
      <text class="wall-text" x="515" y="-992">2026</text>
    </g>
  </g>

  <circle cx="400" cy="300" class="focus-dot" />

  <path d="M 380 280 L 370 280 L 370 290" fill="none" stroke="#e5e7eb" stroke-width="2"/>
  <path d="M 420 280 L 430 280 L 430 290" fill="none" stroke="#e5e7eb" stroke-width="2"/>
  <path d="M 380 320 L 370 320 L 370 310" fill="none" stroke="#e5e7eb" stroke-width="2"/>
  <path d="M 420 320 L 430 320 L 430 310" fill="none" stroke="#e5e7eb" stroke-width="2"/>

</svg>