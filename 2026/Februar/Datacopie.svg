<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Futura:wght@400;600&amp;display=swap');
            
            text {
                font-family: 'Futura', system-ui, sans-serif;
            }

            .title {
                font-size: 42px;
                font-weight: 600;
                fill: #374151;
            }

            .subtitle {
                font-size: 22px;
                font-weight: 400;
                fill: #6B7280;
            }

            .label {
                font-size: 28px;
                font-weight: 600;
                fill: #4B5563;
                text-anchor: middle;
            }

            .sublabel {
                font-size: 20px;
                font-weight: 400;
                fill: #9CA3AF;
                text-anchor: middle;
            }

            .geometric-shape {
                fill: #F3F4F6;
                stroke: #9CA3AF;
                stroke-width: 5;
                stroke-linejoin: round;
                stroke-linecap: round;
            }

            /* Global Animation Settings */
            .shape-group {
                will-change: transform, opacity;
                animation-duration: 24s;
                animation-iteration-count: infinite;
                animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            }

            /* Lifecycle: Center -> Left -> Fade out */
            .shape1 { 
                animation-name: anim1;
                transform: translateX(960px);
            }
            @keyframes anim1 {
                0%, 10% { transform: translateX(960px); opacity: 1; }
                14%, 26% { transform: translateX(600px); opacity: 1; }
                30%, 95% { transform: translateX(200px); opacity: 0; }
                96%, 99% { transform: translateX(960px); opacity: 0; }
                100% { transform: translateX(960px); opacity: 1; }
            }

            /* Common Cycle: Appear Right -> Move Left -> Fade out */
            .shape2 { animation-name: anim2; opacity: 0; }
            @keyframes anim2 {
                0%, 10% { transform: translateX(1320px); opacity: 0; }
                14%, 26% { transform: translateX(1320px); opacity: 1; }
                30%, 43% { transform: translateX(600px); opacity: 1; }
                47%, 100% { transform: translateX(200px); opacity: 0; }
            }

            .shape3 { animation-name: anim3; opacity: 0; }
            @keyframes anim3 {
                0%, 26% { transform: translateX(1320px); opacity: 0; }
                30%, 43% { transform: translateX(1320px); opacity: 1; }
                47%, 60% { transform: translateX(600px); opacity: 1; }
                64%, 100% { transform: translateX(200px); opacity: 0; }
            }

            .shape4 { animation-name: anim4; opacity: 0; }
            @keyframes anim4 {
                0%, 43% { transform: translateX(1320px); opacity: 0; }
                47%, 60% { transform: translateX(1320px); opacity: 1; }
                64%, 76% { transform: translateX(600px); opacity: 1; }
                80%, 100% { transform: translateX(200px); opacity: 0; }
            }

            .shape5 { animation-name: anim5; opacity: 0; }
            @keyframes anim5 {
                0%, 60% { transform: translateX(1320px); opacity: 0; }
                64%, 76% { transform: translateX(1320px); opacity: 1; }
                80%, 92% { transform: translateX(600px); opacity: 1; }
                96%, 100% { transform: translateX(200px); opacity: 0; }
            }

            /* Final Collapse Phase: Reset loop */
            .shape6 { animation-name: anim6; opacity: 0; }
            @keyframes anim6 {
                0%, 76% { transform: translateX(1320px); opacity: 0; }
                80%, 92% { transform: translateX(1320px); opacity: 1; }
                96% { transform: translateX(960px); opacity: 1; }
                100% { transform: translateX(960px); opacity: 0; }
            }

            /* Scanner Animation */
            .scanner {
                animation: scannerAnim 24s infinite cubic-bezier(0.4, 0, 0.2, 1);
                opacity: 0;
            }
            @keyframes scannerAnim {
                0%, 2% { transform: translateX(760px); opacity: 0; }
                3% { transform: translateX(760px); opacity: 1; }
                9% { transform: translateX(1160px); opacity: 1; }
                10% { transform: translateX(1160px); opacity: 0; }

                15% { transform: translateX(1120px); opacity: 0; }
                16% { transform: translateX(1120px); opacity: 1; }
                24% { transform: translateX(1520px); opacity: 1; }
                25%, 32% { transform: translateX(1520px); opacity: 0; }

                32.1% { transform: translateX(1120px); opacity: 0; }
                33% { transform: translateX(1120px); opacity: 1; }
                41% { transform: translateX(1520px); opacity: 1; }
                42%, 49% { transform: translateX(1520px); opacity: 0; }

                49.1% { transform: translateX(1120px); opacity: 0; }
                50% { transform: translateX(1120px); opacity: 1; }
                58% { transform: translateX(1520px); opacity: 1; }
                59%, 66% { transform: translateX(1520px); opacity: 0; }

                66.1% { transform: translateX(1120px); opacity: 0; }
                67% { transform: translateX(1120px); opacity: 1; }
                75% { transform: translateX(1520px); opacity: 1; }
                76%, 82% { transform: translateX(1520px); opacity: 0; }

                82.1% { transform: translateX(1120px); opacity: 0; }
                83% { transform: translateX(1120px); opacity: 1; }
                91% { transform: translateX(1520px); opacity: 1; }
                92%, 100% { transform: translateX(1520px); opacity: 0; }
            }
        </style>

        <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#9CA3AF" stop-opacity="0" />
            <stop offset="100%" stop-color="#9CA3AF" stop-opacity="0.3" />
        </linearGradient>
    </defs>

    <rect width="1920" height="1080" fill="#FFFFFF" />

    <text x="960" y="140" text-anchor="middle" class="title">AI Data Degradation (Model Collapse)</text>
    <text x="960" y="190" text-anchor="middle" class="subtitle">The effect of training models on synthetic data repeatedly</text>

    <g transform="translate(0, 540)">
        
        <g class="shape-group shape1">
            <circle cx="0" cy="0" r="200" class="geometric-shape" />
            <text x="0" y="280" class="label">Original</text>
            <text x="0" y="320" class="sublabel">Real Data - 100% Fidelity</text>
        </g>

        <g class="shape-group shape2">
            <polygon points="200,0 184.78,76.54 141.42,141.42 76.54,184.78 0,200 -76.54,184.78 -141.42,141.42 -184.78,76.54 -200,0 -184.78,-76.54 -141.42,-141.42 -76.54,-184.78 0,-200 76.54,-184.78 141.42,-141.42 184.78,-76.54" class="geometric-shape" />
            <text x="0" y="280" class="label">Generation 1</text>
            <text x="0" y="320" class="sublabel">First AI Synthetic Copy</text>
        </g>

        <g class="shape-group shape3">
            <polygon points="200,0 173.21,100 100,173.21 0,200 -100,173.21 -173.21,100 -200,0 -173.21,-100 -100,-173.21 0,-200 100,-173.21 173.21,-100" class="geometric-shape" />
            <text x="0" y="280" class="label">Generation 2</text>
            <text x="0" y="320" class="sublabel">Subtle loss of detail</text>
        </g>

        <g class="shape-group shape4">
            <polygon points="200,82.84 82.84,200 -82.84,200 -200,82.84 -200,-82.84 -82.84,-200 82.84,-200 200,-82.84" class="geometric-shape" />
            <text x="0" y="280" class="label">Generation 3</text>
            <text x="0" y="320" class="sublabel">Visible artifacts appearing</text>
        </g>

        <g class="shape-group shape5">
            <polygon points="173.21,100 0,200 -173.21,100 -173.21,-100 0,-200 173.21,-100" class="geometric-shape" />
            <text x="0" y="280" class="label">Generation 4</text>
            <text x="0" y="320" class="sublabel">Severe geometric degradation</text>
        </g>

        <g class="shape-group shape6">
            <polygon points="150,150 -150,150 -150,-150 150,-150" class="geometric-shape" />
            <text x="0" y="280" class="label">Model Collapse</text>
            <text x="0" y="320" class="sublabel">Total loss of original structure</text>
        </g>

        <g class="scanner">
            <rect x="-80" y="-250" width="80" height="500" fill="url(#scanGrad)" />
            <line x1="0" y1="-250" x2="0" y2="250" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
        </g>
    </g>
</svg>